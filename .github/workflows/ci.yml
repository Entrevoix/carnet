name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Type check
        run: npx --workspace @carnet/shared tsc --noEmit

      - name: Unit tests
        run: npm -w @carnet/shared test

  mobile:
    runs-on: ubuntu-latest
    needs: [shared]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Type check
        run: cd apps/mobile && npx tsc --noEmit

      - name: Unit tests
        run: npm -w @carnet/mobile test

  desktop:
    runs-on: ubuntu-latest
    needs: [shared]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Type check
        run: cd apps/desktop && npx tsc --noEmit

      - name: Unit tests
        run: npm -w @carnet/desktop test

      - name: Vite build (smoke)
        run: cd apps/desktop && npx vite build

  # Android Kotlin compile smoke test.
  #
  # WHY THIS EXISTS: the Expo config plugins under apps/mobile/plugins/*.js
  # emit native Kotlin as JS template strings. vitest + `tsc --noEmit` only
  # cover JS/TS — they never see the generated Kotlin, so an invalid override
  # signature or type error in a plugin template compiles clean in every other
  # CI job and only blows up on a real `expo prebuild` + Gradle build. Exactly
  # that happened with the B5 `QuickIdeaTaskService.getTaskConfig(intent: Intent)`
  # regression, which reached main invisibly and broke every clean prebuild.
  #
  # This job runs the cheapest thing that reproduces that class of failure:
  # a clean prebuild followed by `:app:compileDebugKotlin` (Kotlin compile
  # only — no dexing, no APK packaging, no assembleDebug).
  #
  # WIRED INTO `gate` since 2026-07-09, after three consecutive green runs on
  # real PRs (#94 2m54s, #95 3m6s, #96 3m27s). This is the required, blocking
  # check that stops the generated-Kotlin bug class from regressing. If the
  # Android toolchain setup ever gets flaky and starts blocking unrelated
  # merges, demote it by removing `mobile-android` from `gate.needs` below
  # (and restore the advisory note here).
  mobile-android:
    runs-on: ubuntu-latest
    needs: [shared]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Versions come from Expo's gradle plugin (ExpoRootProject) for SDK 54:
      # compileSdk 36 / buildTools 36.0.0 / ndk 27.1.12297006. Keep in sync if
      # the Expo SDK bump changes them (visible in a prebuild's Gradle config log).
      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Expo prebuild (android, clean)
        run: cd apps/mobile && npx expo prebuild --clean -p android

      - name: Compile generated Kotlin
        run: cd apps/mobile/android && ./gradlew :app:compileDebugKotlin --console=plain

  # Branch protection requires this job — do not rename without updating
  # Settings → Branches.
  gate:
    runs-on: ubuntu-latest
    needs: [shared, mobile, desktop, mobile-android]
    steps:
      - run: echo "All checks passed"
