name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Type check
        run: npx --workspace @carnet/shared tsc --noEmit

      - name: Unit tests
        run: npm -w @carnet/shared test

  mobile:
    runs-on: ubuntu-latest
    needs: [shared]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Type check
        run: cd apps/mobile && npx tsc --noEmit

  desktop:
    runs-on: ubuntu-latest
    needs: [shared]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Type check
        run: cd apps/desktop && npx tsc --noEmit

      - name: Unit tests
        run: npm -w @carnet/desktop test

      - name: Vite build (smoke)
        run: cd apps/desktop && npx vite build

  # Branch protection requires this job — do not rename without updating
  # Settings → Branches.
  gate:
    runs-on: ubuntu-latest
    needs: [shared, mobile, desktop]
    steps:
      - run: echo "All checks passed"
