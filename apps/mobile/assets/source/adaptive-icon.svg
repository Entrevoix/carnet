<?xml version="1.0" encoding="UTF-8"?>
<!--
  carnet — Android adaptive icon foreground
  1024×1024 transparent. Android composites this over the
  adaptiveIcon.backgroundColor (#2C6155) defined in app.json, then
  applies the user's launcher mask (circle, squircle, rounded square, etc.).

  Geometry:
    - Glyph sized to ~42% of the canvas (~432px) so it sits comfortably
      inside the OS safe zone regardless of mask shape.
    - Same rounded-C as icon.svg, scaled down: radius 176, stroke 80.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <path
    d="M 664 424 A 176 176 0 1 0 664 600"
    fill="none"
    stroke="#F5F2EA"
    stroke-width="80"
    stroke-linecap="round"
  />
</svg>
